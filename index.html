<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CINE COCOBONGO | Gestor de Títulos</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/4221/4221419.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1/dist/city/index.css" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/videojs-seek-buttons/dist/videojs-seek-buttons.css" rel="stylesheet">

    <style>
        :root {
            --bg-body: #14181c; --bg-card: #1b2228; --bg-sidebar: #181d23;
            --text-main: #ffffff; --text-dim: #9ab; --accent: #00e054;
            --imdb: #f5c518; --rotten: #fa320a; --meta: #66cc33;
            --danger: #ff4b4b; --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        [data-theme="light"] {
            --bg-body: #ffffff; --bg-card: #f1f3f5; --bg-sidebar: #e9ecef;
            --text-main: #14181c; --text-dim: #495057; --accent: #00a83e;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-body); color: var(--text-main); display: flex; min-height: 100vh; overflow-x: hidden; transition: var(--transition); }

        /* Sidebar & Navigation */
        aside { 
            width: 280px; background: var(--bg-sidebar); padding: 25px; 
            border-right: 1px solid rgba(0,0,0,0.1); position: fixed; 
            height: 100vh; overflow-y: auto; z-index: 1000; transition: var(--transition);
        }
        @media (max-width: 1024px) {
            aside { left: -280px; }
            aside.open { left: 0; box-shadow: 10px 0 50px rgba(0,0,0,0.8); }
        }

        .sidebar-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            z-index: 999; backdrop-filter: blur(4px); 
        }
        .sidebar-overlay.show { display: block; }

        .logo { font-size: 1.5rem; font-weight: 900; color: var(--accent); margin-bottom: 30px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .menu-section { margin-bottom: 25px; }
        .menu-title { font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1.2px; margin-bottom: 12px; font-weight: 800; }
        
        .menu-item { 
            padding: 12px; border-radius: 10px; cursor: pointer; display: flex; 
            align-items: center; gap: 12px; transition: 0.2s; color: var(--text-dim); font-size: 0.9rem; margin-bottom: 4px;
        }
        .menu-item:hover, .menu-item.active { background: var(--accent); color: #fff; }
        .delete-list-btn { margin-left: auto; color: #fff; border: none; background: transparent; cursor: pointer; opacity: 0.5; padding: 5px; }
        .delete-list-btn:hover { color: var(--danger); opacity: 1; }

        select.filter-select { 
            width: 100%; background: var(--bg-card); color: var(--text-main); 
            border: 1px solid rgba(0,0,0,0.1); padding: 12px; border-radius: 8px; margin-bottom: 10px; outline: none; cursor: pointer; 
        }

        /* Main Content */
        main { flex: 1; margin-left: 280px; padding: 20px; width: 100%; transition: var(--transition); }
        @media (max-width: 1024px) { main { margin-left: 0; } }

        header { 
            display: flex; align-items: center; margin-bottom: 25px; gap: 15px; 
            position: sticky; top: 0; z-index: 100; background: var(--bg-body); padding: 10px 0;
        }
        .menu-toggle { display: none; font-size: 1.4rem; color: var(--text-main); cursor: pointer; }
        @media (max-width: 1024px) { .menu-toggle { display: block; } }

        .search-container { flex: 1; position: relative; }
        .search-container input { 
            width: 100%; padding: 12px 40px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1); 
            background: var(--bg-card); color: var(--text-main); font-size: 1rem; 
        }
        .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }

        /* Grid */
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        @media (max-width: 480px) { .results-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } }

        .movie-card { 
            background: var(--bg-card); border-radius: 12px; overflow: hidden; 
            border: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; transition: 0.2s;
        }
        .poster-wrapper { position: relative; cursor: pointer; }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .rating-badge { 
            position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.8); 
            color: var(--imdb); padding: 4px 6px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; 
        }
        
        .movie-card-info { padding: 12px; flex-grow: 1; cursor: pointer; }
        .movie-card-info h3 { font-size: 0.95rem; margin-bottom: 4px; font-weight: 700; color: var(--text-main); line-height: 1.2; }
        .movie-card-info p { font-size: 0.75rem; color: var(--text-dim); }
        
        .card-actions { display: flex; border-top: 1px solid rgba(0,0,0,0.05); }
        .action-btn { flex: 1; padding: 12px; border: none; cursor: pointer; font-size: 0.8rem; font-weight: 700; background: var(--bg-sidebar); color: var(--text-main); transition: 0.2s; }
        .add-btn:hover { background: var(--accent); color: #fff; }
        .remove-btn:hover { background: var(--danger); color: #fff; }
        .play-btn { border-right: 1px solid rgba(0,0,0,0.1); }
        .play-btn:hover { filter: brightness(1.2); }

        /* Modal */
        #modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            display: none; justify-content: center; align-items: center; z-index: 2000; padding: 15px; backdrop-filter: blur(8px);
        }
        .modal-content { 
            background: var(--bg-card); width: 100%; max-width: 1000px; border-radius: 20px; 
            display: flex; overflow: hidden; position: relative; max-height: 90vh; 
        }
        @media (max-width: 768px) {
            .modal-content { flex-direction: column; overflow-y: auto; }
            .modal-poster { width: 100% !important; height: 300px; }
            .modal-details { padding: 25px !important; }
        }
        .modal-poster { width: 38%; flex-shrink: 0; }
        .modal-poster img { width: 100%; height: 100%; object-fit: cover; }
        .modal-details { padding: 45px; overflow-y: auto; flex: 1; }
        .badges { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .badge { padding: 10px 14px; border-radius: 8px; font-weight: 800; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; }

        .loader { width: 50px; height: 50px; border: 5px solid var(--accent); border-bottom-color: transparent; border-radius: 50%; display: none; animation: rotation 1s linear infinite; margin: 30px auto; }
        @keyframes rotation { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 30px 0; }
        .page-btn { padding: 10px 18px; background: var(--bg-card); border: 2px solid var(--accent); color: var(--accent); border-radius: 12px; cursor: pointer; font-weight: 800; }
        .page-btn:disabled { opacity: 0.2; cursor: not-allowed; }

        /* Estilos do Player de Testes */
        .test-controls {
            background-color: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: grid;
            gap: 15px;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            border: 1px solid rgba(0,0,0,0.1);
        }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { margin-bottom: 5px; font-size: 13px; font-weight: 600; color: var(--text-dim); }
        .input-group input { 
            padding: 10px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.2); 
            background-color: var(--bg-sidebar); color: var(--text-main); font-size: 14px;
        }
        .btn-load {
            grid-column: 1 / -1; background-color: var(--accent); color: #fff;
            border: none; padding: 15px; font-size: 16px; border-radius: 8px;
            cursor: pointer; font-weight: 800; transition: var(--transition);
        }
        .btn-load:hover { background-color: #008f35; }
        .video-container-wrapper {
            width: 100%; max-width: 1000px; margin: 0 auto; background-color: #000;
            border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* ----- CUSTOMIZAÇÕES DO VIDEO.JS: ARQUITETURA DE 2 CAMADAS ----- */
        
        .video-js.vjs-theme-city .vjs-control-bar {
            display: flex !important;
            height: 3.8em !important;
            background-color: rgba(0, 0, 0, 0.9) !important;
            align-items: center !important;
            padding: 0 5px !important;
        }

        /* 1. Joga a barra de progresso para FORA da linha de botões, flutuando acima deles */
        .video-js .vjs-progress-control {
            position: absolute !important;
            top: -1.2em !important; /* Desloca pra cima da barra preta */
            left: 0 !important;
            right: 0 !important;
            width: 100% !important;
            height: 1.5em !important;
            padding: 0 10px !important;
            display: flex !important;
            align-items: center !important;
            touch-action: none !important; 
        }

        /* Ajustes do desenho do slider */
        .video-js .vjs-progress-holder {
            height: 0.6em !important; 
            border-radius: 6px !important;
            margin: 0 !important;
            width: 100% !important;
        }
        .video-js .vjs-play-progress {
            background-color: var(--accent) !important;
            border-radius: 6px !important;
        }
        /* Bolinha da barra redonda e sempre visível */
        .video-js .vjs-play-progress:before {
            display: block !important;
            font-size: 1.5em !important;
            top: -0.45em !important;
            right: -0.4em !important;
            color: #fff !important;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5) !important;
        }

        /* 2. Empurrador Espacial: Garante que o Fullscreen cole no canto direito */
        .video-js .vjs-custom-control-spacer {
            display: flex !important;
            flex: 1 1 auto !important; /* Estica para empurrar o resto */
        }

        /* 3. Evita que os botões excedam a largura da tela */
        .video-js .vjs-button {
            width: 2.8em !important; /* Reduz ligeiramente a largura de cada botão */
            padding: 0 !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }
        .vjs-seek-button { width: 2.8em !important; }
        .video-js .vjs-playback-rate { width: 3.5em !important; } /* Um pouco maior pro texto 1.25x caber */

        .video-js .vjs-button > .vjs-icon-placeholder:before {
            position: relative !important;
            font-size: 2em !important;
            line-height: 1 !important; 
        }

        /* Volume Vertical Ajustado */
        .video-js .vjs-volume-panel {
            width: 3em !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }
        .vjs-slider-vertical .vjs-volume-level {
            background-color: var(--accent) !important;
            width: 0.8em !important; 
            margin: 0 auto !important;
        }
        .vjs-slider-vertical .vjs-volume-level:before { left: -0.2em !important; }

        /* 4. Corrige as legendas sumindo ou escondidas atrás dos botões */
        .video-js .vjs-text-track-display {
            bottom: 4.5em !important; /* Eleva a legenda acima da nova área de controle */
            pointer-events: none !important;
        }
    </style>
</head>
<body data-theme="dark">

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <aside id="sidebar">
        <div class="logo" onclick="window.location.reload()">
            <i class="fas fa-play-circle"></i> CINE COCOBONGO
        </div>
        
        <div class="menu-section">
            <p class="menu-title">Navegação</p>
            <div class="menu-item active" id="nav-trending" onclick="changeMode('trending')"><i class="fas fa-fire"></i> Bombando</div>
            <div class="menu-item" id="nav-top" onclick="changeMode('top_rated')"><i class="fas fa-trophy"></i> Melhor Avaliados</div>
            <div class="menu-item" id="nav-player" onclick="changeMode('player')"><i class="fas fa-laptop-code"></i> Player de Testes</div>
        </div>

        <div class="menu-section">
            <p class="menu-title">Filtros Inteligentes</p>
            <select class="filter-select" id="filter-genre" onchange="resetAndLoad()">
                <option value="">Gêneros (Todos)</option>
                <option value="99">Documentários</option>
                <option value="28">Ação</option>
                <option value="35">Comédia</option>
                <option value="18">Drama</option>
                <option value="27">Terror</option>
                <option value="878">Ficção Científica</option>
            </select>

            <select class="filter-select" id="filter-period" onchange="resetAndLoad()">
                <option value="">Período (Todos)</option>
                <option value="2026">2026</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2020-2023">2020 a 2023</option>
                <option value="2010-2019">Década de 2010</option>
                <option value="2000-2009">Década de 2000</option>
                <option value="1900-1999">Clássicos</option>
            </select>

            <select class="filter-select" id="filter-sort" onchange="resetAndLoad()">
                <option value="popularity.desc">Mais Populares</option>
                <option value="primary_release_date.desc">Lançamentos</option>
                <option value="vote_average.desc">Notas Altas</option>
            </select>
        </div>

        <div class="menu-section">
            <p class="menu-title">Minhas Coleções</p>
            <div id="sidebar-lists"></div>
            <div class="menu-item" style="color:var(--accent); font-weight: 800" onclick="createNewList()">
                <i class="fas fa-plus-circle"></i> Criar Lista Vazia
            </div>
        </div>
    </aside>

    <main>
        <header>
            <div class="menu-toggle" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </div>
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="global-search" placeholder="Título, série, curta..." onkeyup="handleSearch(event)">
            </div>
            <div class="theme-toggle" onclick="toggleTheme()" style="cursor: pointer; padding: 10px;">
                <i class="fas fa-adjust" style="font-size: 1.2rem;"></i>
            </div>
        </header>

        <div id="view-catalog">
            <div class="loader" id="main-loader"></div>
            <div class="results-grid" id="main-grid"></div>

            <div class="pagination" id="pagination-ctrl">
                <button class="page-btn" id="btn-prev" onclick="changePage(-1)"><i class="fas fa-chevron-left"></i></button>
                <span id="page-indicator" style="font-weight: 800">Página 1</span>
                <button class="page-btn" id="btn-next" onclick="changePage(1)"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div id="view-player" style="display: none; padding-bottom: 40px;">
            <h2 style="margin-bottom: 20px; font-weight: 800;">Simulador de Nuvem (Upload & Streaming)</h2>
            
            <div class="test-controls">
                <div class="input-group">
                    <label>Link do Vídeo MP4 (Ex: AWS, Cloudflare)</label>

                <div class="input-group">

                    <input type="text" id="url-sub" placeholder="https://nuvem.com/legenda.vtt">

                    <label>Teste Rápido: Arquivo Local (Vídeo)</label>
                    <input type="file" id="file-video" accept="video/*">
                </div>
                <div class="input-group">
                    <label>Teste Rápido: Arquivo Local (Legenda .vtt)</label>
                    <input type="file" id="file-sub" accept=".vtt">
                </div>
                <button class="btn-load" onclick="carregarPlayerTeste()"><i class="fas fa-play"></i> Iniciar Reprodução</button>
            </div>

            <div class="video-container-wrapper">
                <video
                    id="meu-player"
                    class="video-js vjs-big-play-centered vjs-theme-city vjs-show-big-play-button-on-pause"

                    preload="metadata"

    </main>

    <div id="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span style="position: absolute; right: 20px; top: 15px; font-size: 2rem; cursor: pointer; color: #fff; z-index: 100;" onclick="closeModal()">&times;</span>
            <div class="modal-poster"><img src="" id="modal-img"></div>
            <div class="modal-details" id="modal-body"></div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-seek-buttons/dist/videojs-seek-buttons.min.js"></script>

    <script>
        const TMDB_KEY = '61bfe826a425f60001a4dc8365ea05dc';
        const OMDB_KEY = 'e4649501';
        const BIN_ID = '6999fe9843b1c97be991ae3f';
        const MASTER_KEY = '$2a$10$eoyd0OtUFB/Jah3O/UAm0OLok1mrWtq7JtCAe0D9IdT268eYEzxTu';

        let appData = { a: [{"1": "b"}], lists: [] };
        let currentPage = 1, currentMode = 'trending', searchQuery = '', currentListId = null, timer;
        let playerInstancia;

        async function init() {
            showLoader(true);
            
            playerInstancia = videojs('meu-player', { 
                fluid: true, 
                responsive: true,
                playbackRates: [0.5, 1, 1.25, 1.5, 2],
                controlBar: {
                    skipButtons: {
                        forward: 10,
                        backward: 10
                    }
                }
            });

            playerInstancia.seekButtons({
                forward: 10,
                back: 10
            });

            await syncJSONBin('GET');
            await loadContent();
            renderListsSidebar();
            showLoader(false);
        }

        async function syncJSONBin(method) {
            try {
                const url = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
                const headers = { 'X-Master-Key': MASTER_KEY, 'Content-Type': 'application/json' };
                if (method === 'GET') {
                    const res = await fetch(`${url}/latest`, { headers });
                    const json = await res.json();
                    if (json.record && json.record.lists) appData = json.record;
                } else {
                    await fetch(url, { method: 'PUT', headers, body: JSON.stringify(appData) });
                }
            } catch (e) { console.error("Sync Erro"); }
        }

        async function loadContent() {
            showLoader(true);
            const genre = document.getElementById('filter-genre').value;
            const period = document.getElementById('filter-period').value;
            const sort = document.getElementById('filter-sort').value;
            
            let url = '';
            if (currentMode === 'list') {
                await renderUserList();
                showLoader(false);
                return;
            }

            if (searchQuery.length > 2) {
                url = `https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&language=pt-BR&query=${encodeURIComponent(searchQuery)}&page=${currentPage}`;
            } else if (currentMode === 'trending') {
                url = `https://api.themoviedb.org/3/trending/all/week?api_key=${TMDB_KEY}&language=pt-BR&page=${currentPage}`;
            } else {
                url = `https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_KEY}&language=pt-BR&sort_by=${sort}&page=${currentPage}&vote_count.gte=10&release_date.lte=2026-12-31`;
                if (genre) url += `&with_genres=${genre}`;
                if (period) {
                    if (period.includes('-')) {
                        const [s, e] = period.split('-');
                        url += `&primary_release_date.gte=${s}-01-01&primary_release_date.lte=${e}-12-31`;
                    } else url += `&primary_release_year=${period}`;
                }
            }

            try {
                const res = await fetch(url);
                const data = await res.json();
                let results = data.results || [];

                if (searchQuery.length > 2 && (genre || period)) {
                    results = results.filter(m => {
                        const y = (m.release_date || m.first_air_date || '').split('-')[0];
                        const g = m.genre_ids || [];
                        const matchG = genre ? g.includes(parseInt(genre)) : true;
                        let matchY = true;
                        if (period) {
                            if (period.includes('-')) {
                                const [s, e] = period.split('-');
                                matchY = y >= s && y <= e;
                            } else matchY = y === period;
                        }
                        return matchG && matchY;
                    });
                }

                renderGrid(results);
                updatePagination(data.page || 1, data.total_pages || 1);
            } catch (e) { console.error("Fetch Erro"); }
            showLoader(false);
        }

        function renderGrid(items) {
            const grid = document.getElementById('main-grid');
            if (!items.length) {
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:50px; opacity:0.5">Nenhum título encontrado.</div>`;
                return;
            }
            grid.innerHTML = items.map(m => {
                const isTv = m.media_type === 'tv' || (!m.media_type && m.first_air_date);
                const title = m.title || m.name || 'Sem título';
                const date = (m.release_date || m.first_air_date || '').split('-')[0];
                
                const temLinkNaNuvem = false; 
                
                const playBtn = temLinkNaNuvem 
                    ? `<button class="action-btn play-btn" style="background:var(--accent); color:#fff;"><i class="fas fa-play"></i></button>`
                    : `<button class="action-btn play-btn" style="background:#2a2a2a; color:#888;" title="Indisponível - Ir para testes" onclick="irParaPlayerTeste()"><i class="fas fa-video-slash"></i></button>`;

                return `
                <div class="movie-card">
                    <div class="poster-wrapper" onclick="showDetails(${m.id}, '${isTv ? 'tv' : 'movie'}')">
                        <img src="${m.poster_path ? 'https://image.tmdb.org/t/p/w500'+m.poster_path : 'https://via.placeholder.com/500x750?text=Pôster'}">
                        <div class="rating-badge"><i class="fas fa-star"></i> ${m.vote_average?.toFixed(1) || '0.0'}</div>
                    </div>
                    <div class="movie-card-info" onclick="showDetails(${m.id}, '${isTv ? 'tv' : 'movie'}')">
                        <h3>${title}</h3>
                        <p>${date} • <i>${m.original_title || m.original_name || ''}</i></p>
                    </div>
                    <div class="card-actions">
                        ${playBtn}
                        ${currentListId ? 
                            `<button class="action-btn remove-btn" onclick="removeFromList(${m.id})"><i class="fas fa-trash-alt"></i></button>` : 
                            `<button class="action-btn add-btn" onclick="addToListPrompt(${m.id}, '${title.replace(/'/g, "\\'")}', '${isTv ? 'tv' : 'movie'}')"><i class="fas fa-plus"></i></button>`
                        }
                    </div>
                </div>`;
            }).join('');
        }

        function irParaPlayerTeste() {
            alert("Vídeo ainda não vinculado na nuvem. Redirecionando para o Player de Testes para simulação.");
            changeMode('player');
            closeModal();
        }

        async function showDetails(id, type) {
            showLoader(true);
            try {
                const tmdb = await (await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_KEY}&language=pt-BR&append_to_response=credits,external_ids`)).json();
                const imdbId = tmdb.external_ids?.imdb_id || tmdb.imdb_id;
                let omdb = {};
                if (imdbId) omdb = await (await fetch(`https://www.omdbapi.com/?apikey=${OMDB_KEY}&i=${imdbId}`)).json();

                const safeTitle = (tmdb.title || tmdb.name).replace(/'/g, "\\'");

                document.getElementById('modal-img').src = tmdb.poster_path ? `https://image.tmdb.org/t/p/w500${tmdb.poster_path}` : '';
                document.getElementById('modal-body').innerHTML = `
                    <h2 style="font-size:2rem; margin-bottom:10px">${tmdb.title || tmdb.name}</h2>
                    <p style="color:var(--text-dim); margin-bottom:20px">${tmdb.original_title || tmdb.original_name} • ${tmdb.runtime || '--'} min</p>
                    
                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <button onclick="irParaPlayerTeste()" style="flex:1; background:var(--accent); color:#fff; border:none; padding:12px 24px; border-radius:8px; font-weight:800; cursor:pointer; font-size:1rem; transition:0.2s" onmouseover="this.style.filter='brightness(1.2)'" onmouseout="this.style.filter='none'">
                            <i class="fas fa-play"></i> Assistir Título (Teste)
                        </button>
                        <button onclick="addToListPrompt(${tmdb.id}, '${safeTitle}', '${type}')" style="flex:1; background:var(--bg-sidebar); color:var(--text-main); border:1px solid rgba(255,255,255,0.1); padding:12px 24px; border-radius:8px; font-weight:800; cursor:pointer; font-size:1rem; transition:0.2s" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='var(--bg-sidebar)'">
                            <i class="fas fa-plus"></i> Salvar na Lista
                        </button>
                    </div>

                    <div class="badges">
                        <div class="badge" style="background:var(--imdb); color:#000"><i class="fab fa-imdb"></i> ${omdb.imdbRating || tmdb.vote_average.toFixed(1)}</div>
                        <div class="badge" style="background:var(--rotten); color:#fff"><i class="fas fa-apple-alt"></i> ${omdb.Ratings?.find(r => r.Source === "Rotten Tomatoes")?.Value || "N/A"}</div>
                        <div class="badge" style="background:var(--meta); color:#fff"><i class="fas fa-chart-line"></i> ${omdb.Metascore || "N/A"}</div>
                    </div>
                    <p style="margin-bottom:25px; line-height:1.7">${tmdb.overview || 'Sem descrição.'}</p>
                    <div style="font-size:0.9rem; background:rgba(0,0,0,0.1); padding:20px; border-radius:12px">
                        <p><strong>🎥 Direção/Criador:</strong> ${tmdb.credits?.crew?.find(c => c.job === 'Director')?.name || tmdb.created_by?.[0]?.name || 'N/A'}</p>
                    </div>`;
                document.getElementById('modal-overlay').style.display = 'flex';
            } catch (e) { alert("Erro ao carregar detalhes."); }
            showLoader(false);
        }

        function changeMode(mode) {
            currentMode = mode; currentListId = null; searchQuery = '';
            document.getElementById('global-search').value = '';
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            
            if (mode === 'player') {
                document.getElementById('nav-player').classList.add('active');
                document.getElementById('view-catalog').style.display = 'none';
                document.getElementById('view-player').style.display = 'block';
                if (window.innerWidth <= 1024) toggleSidebar();
            } else {
                document.getElementById('view-catalog').style.display = 'block';
                document.getElementById('view-player').style.display = 'none';
                document.getElementById(mode === 'trending' ? 'nav-trending' : 'nav-top').classList.add('active');
                document.getElementById('pagination-ctrl').style.display = 'flex';
                currentPage = 1; 
                if (window.innerWidth <= 1024) toggleSidebar(); 
                loadContent();
            }
        }

        function carregarPlayerTeste() {
            const urlVideo = document.getElementById('url-video').value.trim();
            const urlSub = document.getElementById('url-sub').value.trim();
            const fileVideo = document.getElementById('file-video').files[0];
            const fileSub = document.getElementById('file-sub').files[0];

            let fonteVideo = "";
            let tipoVideo = "video/mp4";
            let fonteSub = "";

            if (fileVideo) {
                fonteVideo = URL.createObjectURL(fileVideo);
                tipoVideo = fileVideo.type || "video/mp4";
            } else if (urlVideo) {
                fonteVideo = urlVideo;
            }

            if (fileSub) {
                fonteSub = URL.createObjectURL(fileSub);
            } else if (urlSub) {
                fonteSub = urlSub;
            }

            if (!fonteVideo) {
                alert("Por favor, insira um link da nuvem ou selecione um arquivo de vídeo.");
                return;
            }

            playerInstancia.src({ type: tipoVideo, src: fonteVideo });

            // Remove legendas antigas
            const tracksAnteriores = playerInstancia.remoteTextTracks();
            while (tracksAnteriores.length > 0) {
                playerInstancia.removeRemoteTextTrack(tracksAnteriores[0]);
            }

            // Adiciona e FORÇA a exibição da nova legenda
            if (fonteSub) {
                let novaLegenda = playerInstancia.addRemoteTextTrack({
                    kind: 'captions',
                    src: fonteSub,
                    srclang: 'pt-br',
                    label: 'Português',
                    default: true
                }, true);
                
                // O segredo para forçar o carregamento imediato da legenda no Video.js
                novaLegenda.track.mode = 'showing';
            }

            playerInstancia.load();
            playerInstancia.play().catch(e => console.log("Autoplay bloqueado pelo navegador."));
            
            document.querySelector('.video-container-wrapper').scrollIntoView({ behavior: 'smooth' });
        }

        async function createNewList() {
            const name = prompt("Nome da Coleção:");
            if (!name) return;
            appData.lists.push({ id: Date.now().toString(), name, items: [] });
            await syncJSONBin('PUT');
            renderListsSidebar();
            alert("Lista criada com sucesso!");
        }

        async function deleteList(id, e) {
            e.stopPropagation();
            if (confirm("Apagar esta lista?")) {
                appData.lists = appData.lists.filter(l => l.id !== id);
                if (currentListId === id) changeMode('trending');
                await syncJSONBin('PUT');
                renderListsSidebar();
            }
        }

        async function addToListPrompt(id, title, type) {
            let promptText = "Escolha a lista (digite o número):\n";
            promptText += "0. ➕ CRIAR NOVA LISTA\n\n";
            
            if (appData.lists.length > 0) {
                promptText += appData.lists.map((l, i) => `${i+1}. ${l.name}`).join('\n');
            } else {
                promptText += "(Você ainda não tem listas salvas)";
            }
            
            const choice = prompt(promptText);
            if (choice === null || choice.trim() === "") return; 
            
            const num = parseInt(choice);
            
            if (num === 0) {
                const newName = prompt("Qual o nome da nova lista?");
                if (!newName || newName.trim() === "") return;
                
                const newListId = Date.now().toString();
                appData.lists.push({ id: newListId, name: newName, items: [{id, type}] });
                await syncJSONBin('PUT');
                renderListsSidebar();
                alert(`Lista "${newName}" criada e filme salvo nela!`);
                return;
            }
            
            const idx = num - 1;
            if (appData.lists[idx]) {
                if (appData.lists[idx].items.some(i => i.id === id)) {
                    return alert("Este título já está salvo nesta lista!");
                }
                appData.lists[idx].items.push({ id, type });
                await syncJSONBin('PUT');
                renderListsSidebar();
                alert(`Salvo com sucesso na lista "${appData.lists[idx].name}"!`);
            } else {
                alert("Opção inválida.");
            }
        }

        async function removeFromList(id) {
            const list = appData.lists.find(l => l.id === currentListId);
            list.items = list.items.filter(i => i.id !== id);
            await syncJSONBin('PUT');
            renderListsSidebar();
            renderUserList();
        }

        function renderListsSidebar() {
            const container = document.getElementById('sidebar-lists');
            container.innerHTML = appData.lists.map(l => `
                <div class="menu-item ${currentListId === l.id ? 'active' : ''}" onclick="viewCollection('${l.id}')">
                    <i class="fas fa-bookmark"></i> <span style="flex:1; overflow:hidden; text-overflow:ellipsis">${l.name}</span>
                    <button class="delete-list-btn" onclick="deleteList('${l.id}', event)"><i class="fas fa-trash"></i></button>
                </div>`).join('');
        }

        async function viewCollection(id) {
            currentListId = id; currentMode = 'list';
            if (window.innerWidth <= 1024) toggleSidebar();
            document.getElementById('view-catalog').style.display = 'block';
            document.getElementById('view-player').style.display = 'none';
            document.getElementById('pagination-ctrl').style.display = 'none';
            loadContent();
        }

        async function renderUserList() {
            const list = appData.lists.find(l => l.id === currentListId);
            if (!list.items.length) { renderGrid([]); return; }
            const promises = list.items.map(i => fetch(`https://api.themoviedb.org/3/${i.type}/${i.id}?api_key=${TMDB_KEY}&language=pt-BR`).then(r => r.json()));
            const results = await Promise.all(promises);
            renderGrid(results);
        }

        function handleSearch(e) {
            clearTimeout(timer);
            timer = setTimeout(() => {
                searchQuery = e.target.value;
                if (searchQuery.length > 2) { 
                    currentMode = 'search'; 
                    currentListId = null;
                    document.getElementById('view-catalog').style.display = 'block';
                    document.getElementById('view-player').style.display = 'none';
                }
                else if (searchQuery.length === 0) currentMode = 'trending';
                currentPage = 1; loadContent();
            }, 600);
        }

        function resetAndLoad() {
            currentPage = 1; currentMode = searchQuery.length > 2 ? 'search' : 'discover'; currentListId = null;
            document.getElementById('view-catalog').style.display = 'block';
            document.getElementById('view-player').style.display = 'none';
            document.getElementById('pagination-ctrl').style.display = 'flex'; loadContent();
        }

        function changePage(d) { currentPage += d; loadContent(); window.scrollTo(0,0); }
        function updatePagination(c, t) {
            const max = t > 500 ? 500 : t;
            document.getElementById('page-indicator').innerText = `Pág. ${c} de ${max}`;
            document.getElementById('btn-prev').disabled = c === 1;
            document.getElementById('btn-next').disabled = c >= max;
        }

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }
        function toggleTheme() { 
            const b = document.body;
            b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }
        function showLoader(s) { document.getElementById('main-loader').style.display = s ? 'block' : 'none'; }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        init();
    </script>
</body>
</html>
